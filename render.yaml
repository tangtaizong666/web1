databases:
  - name: campus-cycle-db
    plan: basic-256mb
    databaseName: campus_cycle
    user: campus_cycle_user

services:
  - type: web
    name: campus-cycle-web1-tangtaizong666
    runtime: docker
    plan: starter
    autoDeploy: true
    disk:
      name: uploads
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: SERVER_PORT
        value: 10000
      - key: APP_URL
        value: https://campus-cycle-web1-tangtaizong666.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: campus-cycle-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: AI_RELAY_BASE_URL
        value: http://wucur.com:6543
      - key: AI_RELAY_API_KEY
        sync: false
      - key: AI_MODEL
        value: gpt-5.4
      - key: UPLOAD_DIR
        value: /var/data/uploads
      - key: MAX_UPLOAD_SIZE_MB
        value: 10
