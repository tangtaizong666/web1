services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: campus_cycle
      POSTGRES_USER: campus_cycle
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
      SERVER_PORT: 10000
      DATABASE_URL: postgres://campus_cycle:${POSTGRES_PASSWORD}@db:5432/campus_cycle
      UPLOAD_DIR: /app/uploads
    ports:
      - "80:10000"
    volumes:
      - ./uploads:/app/uploads

volumes:
  postgres-data:
